name: Model Training

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data
        run: |
          if [ -f data/raw/manifest.csv ]; then
            python scripts/prepare_data.py --config configs/default.yaml
          else
            echo "Dataset manifest not found; skipping data preparation"
          fi

      - name: Train model
        run: |
          if [ -f data/processed/train.csv ]; then
            python scripts/train.py --config configs/default.yaml
          else
            echo "Train split missing; skipping training"
          fi

      - name: Evaluate model
        run: |
          if [ -f checkpoints/best_model.pt ]; then
            python scripts/evaluate.py --config configs/default.yaml --checkpoint checkpoints/best_model.pt
          else
            echo "Checkpoint missing; skipping evaluation"
          fi
