apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpr-dashboard
  labels:
    app: alpr-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpr-dashboard
  template:
    metadata:
      labels:
        app: alpr-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/your-org/alpr-system:latest
          command: ["streamlit", "run", "src/dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
          ports:
            - containerPort: 8501
          env:
            - name: SQLITE_DB_PATH
              value: /app/artifacts/parking_events.sqlite3
---
apiVersion: v1
kind: Service
metadata:
  name: alpr-dashboard-service
spec:
  selector:
    app: alpr-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer
